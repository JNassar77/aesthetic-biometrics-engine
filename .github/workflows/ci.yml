name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system libraries (MediaPipe headless GL deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libgles2 libegl1

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov pytest-asyncio httpx

      # No model download needed: the test suite mocks the landmarker and never
      # loads the real .task file (verified — 499 tests pass without it).
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      # The Dockerfile downloads + SHA-verifies the model itself, so the build is
      # self-contained (no pre-download here — this also proves that on every CI run).
      - name: Build Docker image
        run: docker build -t aesthetic-biometrics:${{ github.sha }} .

      - name: Check image size
        run: |
          SIZE=$(docker image inspect aesthetic-biometrics:${{ github.sha }} --format='{{.Size}}')
          SIZE_GB=$(echo "scale=2; $SIZE / 1073741824" | bc)
          echo "Image size: ${SIZE_GB}GB"
          # Fail if > 2GB (generous limit for CI; target < 1.5GB)
          if (( SIZE > 2147483648 )); then
            echo "::error::Docker image exceeds 2GB limit"
            exit 1
          fi
